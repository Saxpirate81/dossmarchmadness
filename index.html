<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Your App Name</title>

    <link rel="manifest" href="/manifest.json">

    <link rel="apple-touch-icon" href="/icon-512.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Your App Name">

    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        
        /* The Android Install Button */
        #installBtn {
            display: none; 
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            padding: 15px 30px;
            background-color: #000000; 
            color: #ffffff;
            border: none;
            border-radius: 25px;
            font-size: 18px;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            cursor: pointer;
            z-index: 1000; 
        }

        /* The iOS Prompt Bubble */
        #iosPrompt {
            display: none; 
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background-color: #ffffff;
            color: #333333;
            padding: 15px 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            z-index: 1000;
            text-align: center;
            width: 260px;
            font-size: 14px;
            line-height: 1.4;
        }
        
        /* The little arrow pointing down on the iOS bubble */
        #iosPrompt::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            margin-left: -10px;
            border-width: 10px 10px 0;
            border-style: solid;
            border-color: #ffffff transparent transparent transparent;
        }
    </style>
</head>
<body>
    <iframe src="https://script.google.com/macros/s/YOUR_SCRIPT_ID/exec"></iframe>

    <button id="installBtn">Install App</button>

    <div id="iosPrompt">
        Tap the <strong>Share</strong> icon below<br>
        and select <strong>Add to Home Screen</strong>.
    </div>

    <script>
        // --- ANDROID INSTALL LOGIC ---
        let deferredPrompt;
        const installBtn = document.getElementById('installBtn');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installBtn.style.display = 'block';
        });

        installBtn.addEventListener('click', async () => {
            installBtn.style.display = 'none';
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                deferredPrompt = null;
            }
        });

        window.addEventListener('appinstalled', () => {
            installBtn.style.display = 'none';
        });

        // --- IOS INSTALL LOGIC ---
        const isIos = () => {
            const userAgent = window.navigator.userAgent.toLowerCase();
            return /iphone|ipad|ipod/.test(userAgent);
        };
        // Checks if the app is already running from the home screen
        const isInStandaloneMode = () => ('standalone' in window.navigator) && (window.navigator.standalone);

        // If it's an iPhone AND it's not already installed, show the bubble
        if (isIos() && !isInStandaloneMode()) {
            document.getElementById('iosPrompt').style.display = 'block';
            
            // Optional: Hide the prompt after 10 seconds so it doesn't block their view forever
            setTimeout(() => {
                document.getElementById('iosPrompt').style.display = 'none';
            }, 10000);
        }
    </script>
</body>
</html>
